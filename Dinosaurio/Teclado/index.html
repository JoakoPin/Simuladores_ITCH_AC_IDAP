<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador: El Viaje de la Tecla (Acumulativo)</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #panel-tecnico { width: 90%; height: 85px; background: #1e293b; border: 2px solid #334155; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; padding: 10px; text-align: center; font-size: 0.85em; color: #94a3b8; font-style: italic; }
        #escenario-maestro { display: grid; grid-template-columns: 180px 180px 180px; grid-template-rows: 100px 100px; gap: 60px; position: relative; }
        
        .bloque { width: 180px; height: 80px; background: #334155; border: 2px solid #64748b; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 8px; z-index: 5; transition: all 0.4s ease; font-size: 0.85em; text-align: center; }
        
        /* Líneas de conexión */
        .linea { position: absolute; background: #1e293b; border: 1px solid #334155; z-index: 1; transition: all 0.4s ease; }
        .activa { background: #fbbf24 !important; box-shadow: 0 0 15px #fbbf24 !important; border-color: #fbbf24 !important; }
        
        /* Iluminación persistente por bloque */
        .iluminar-teclado { background: #92400e !important; box-shadow: 0 0 20px #fbbf24 !important; border-color: #fbbf24 !important; }
        .iluminar-ctrl { background: #5b21b6 !important; box-shadow: 0 0 20px #a78bfa !important; border-color: #a78bfa !important; }
        .iluminar-cpu { background: #075985 !important; box-shadow: 0 0 20px #38bdf8 !important; border-color: #38bdf8 !important; }
        .iluminar-ram { background: #7e22ce !important; box-shadow: 0 0 20px #d946ef !important; border-color: #d946ef !important; }
        .iluminar-gpu { background: #9f1239 !important; box-shadow: 0 0 20px #fb7185 !important; border-color: #fb7185 !important; }
        .iluminar-mon { background: #064e3b !important; box-shadow: 0 0 20px #22c55e !important; border-color: #22c55e !important; }

        #dato { width: 25px; height: 25px; background: #fbbf24; position: absolute; top: 27px; left: 77px; z-index: 10; border-radius: 4px; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); display: none; box-shadow: 0 0 15px #fbbf24; }
        button { padding: 15px 30px; background: #22c55e; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; margin-top: 30px; }
        #texto-narrativo { font-size: 1.1em; margin-top: 15px; color: #fbbf24; text-align: center; max-width: 80%; min-height: 50px; }
    </style>
</head>
<body>
    <div id="panel-tecnico">Sistema listo. ¡Observa cómo fluye la señal de la tecla!</div>
    <div id="escenario-maestro">
        <div class="bloque" id="teclado">TECLADO</div>
        <div class="bloque" id="ram">RAM (BUFFER)</div>
        <div class="bloque" id="gpu">SOFTWARE / GPU</div>
        <div class="bloque" id="ctrl">CONTROLADOR E/S</div>
        <div class="bloque" id="cpu">CPU (KERNEL)</div>
        <div class="bloque" id="monitor">MONITOR</div>
        
        <div class="linea" id="l-teclado-ctrl" style="left: 90px; top: 80px; width: 4px; height: 105px;"></div>
        <div class="linea" id="l-ctrl-cpu" style="left: 180px; top: 200px; width: 60px; height: 4px;"></div>
        <div class="linea" id="l-cpu-ram" style="left: 330px; top: 80px; width: 4px; height: 105px;"></div>
        <div class="linea" id="l-ram-gpu" style="left: 420px; top: 40px; width: 60px; height: 4px;"></div>
        <div class="linea" id="l-gpu-mon" style="left: 570px; top: 80px; width: 4px; height: 105px;"></div>
        
        <div id="dato"></div>
    </div>
    <p id="texto-narrativo">Mapache: ¡Haz clic para iniciar el viaje de la tecla!</p>
    <button id="btn-accion" onclick="ejecutarPaso()">INICIAR PASO 1</button>

    <script>
        let estado = 0;
        const dato = document.getElementById('dato');
        const txt = document.getElementById('texto-narrativo');
        const pnl = document.getElementById('panel-tecnico');
        const btn = document.getElementById('btn-accion');
        const pos = { teclado: {top: '27px', left: '77px'}, ctrl: {top: '187px', left: '77px'}, cpu: {top: '187px', left: '317px'}, ram: {top: '27px', left: '317px'}, gpu: {top: '27px', left: '557px'}, mon: {top: '187px', left: '557px'} };

        function ejecutarPaso() {
            if (estado === 0) {
                dato.style.display = "block";
                document.getElementById('teclado').classList.add('iluminar-teclado');
                pnl.innerText = "Paso 1: El hardware genera la señal eléctrica al presionar la tecla.";
                txt.innerText = "Mapache: ¡Tecla presionada! La señal eléctrica nace aquí.";
                btn.innerText = "PASO 2: CONTROLADOR E/S"; estado = 1;
            } else if (estado === 1) {
                dato.style.top = pos.ctrl.top; document.getElementById('l-teclado-ctrl').classList.add('activa');
                document.getElementById('ctrl').classList.add('iluminar-ctrl');
                pnl.innerText = "Paso 2: Conversión a Scan Code e Interrupción (IRQ).";
                txt.innerText = "Mapache: ¡Traduciendo la señal para la CPU!";
                btn.innerText = "PASO 3: CPU (KERNEL)"; estado = 2;
            } else if (estado === 2) {
                dato.style.left = pos.cpu.left; document.getElementById('l-ctrl-cpu').classList.add('activa');
                document.getElementById('cpu').classList.add('iluminar-cpu');
                pnl.innerText = "Paso 3: El Kernel procesa la interrupción.";
                txt.innerText = "Mapache: ¡La CPU tomó el control del mensaje!";
                btn.innerText = "PASO 4: RAM (BUFFER)"; estado = 3;
            } else if (estado === 3) {
                dato.style.top = pos.ram.top; document.getElementById('l-cpu-ram').classList.add('activa');
                document.getElementById('ram').classList.add('iluminar-ram');
                pnl.innerText = "Paso 4: Almacenamiento en el Buffer de RAM.";
                txt.innerText = "Mapache: ¡Guardando en la RAM para no perder la tecla!";
                btn.innerText = "PASO 5: GPU / SOFTWARE"; estado = 4;
            } else if (estado === 4) {
                dato.style.left = pos.gpu.left; document.getElementById('l-ram-gpu').classList.add('activa');
                document.getElementById('gpu').classList.add('iluminar-gpu');
                pnl.innerText = "Paso 5: Procesamiento de la imagen.";
                txt.innerText = "Mapache: ¡La GPU prepara cómo dibujar la letra!";
                btn.innerText = "PASO 6: MONITOR"; estado = 5;
            } else if (estado === 5) {
                dato.style.top = pos.mon.top; document.getElementById('l-gpu-mon').classList.add('activa');
                document.getElementById('monitor').classList.add('iluminar-mon');
                pnl.innerText = "Paso 6: Actualización de píxeles en pantalla.";
                txt.innerText = "Mapache: ¡Listo! La tecla aparece en el monitor.";
                btn.disabled = true; btn.innerText = "FLUJO COMPLETADO";
            }
        }
    </script>
</body>
</html>
