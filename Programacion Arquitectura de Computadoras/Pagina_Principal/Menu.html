<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Menu</title>
    <style>
        /* Eliminamos cualquier margen que pueda ocultar la imagen */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Contenedor que llena toda la pantalla */
        .fondo {
            width: 100vw;
            height: 100vh;
            background-image: url('Mapaches.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* El recuadro transparente */
        .ventana {
            background-color: rgba(255, 255, 255, 0.4);
            padding: 50px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 300px;
        }

        /* Los botones */
        .boton {
            background-color: #004a99;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }

        .boton:hover {
            background-color: #007bff;
        }
    </style>
</head>

<body>

    <div class="fondo">
        <div class="ventana">
            <button class="boton">Prácticas de la unidad 4</button>
            <button class="boton">Prácticas de la unidad 3</button>
            <button class="boton">Prácticas de la unidad 2</button>
        </div>
    </div>

</body>

</html>
