<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego Mapache E/S - Tamaño Unificado</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #000; overflow: hidden; }
        #escena { position: relative; width: 100%; height: 100vh; }
        
        #fondo { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: -1; transition: opacity 0.2s ease; }
        
        /* Contenedor para agrupar personaje y texto */
        #contenedor-personaje {
            position: absolute;
            bottom: 20px; 
            display: flex;
            flex-direction: column-reverse; 
            align-items: center; 
            z-index: 1;
            transition: all 0.5s ease-in-out; 
        }

        #personaje { 
            /* TAMAÑO ÚNICO PARA TODAS LAS IMÁGENES */
            height: 500px; 
            width: auto; /* Mantiene la proporción */
            background-color: transparent !important;
            margin-bottom: 15px;
            object-fit: contain;
            object-position: bottom center;
        }

        #mensaje {
            background: rgba(255,255,255,0.95);
            padding: 20px 30px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            max-width: 500px;
            text-align: center;
            position: relative;
        }

        #mensaje h2 { font-size: 18px; margin: 0 0 10px 0; color: #333; }

        /* Triangulito del bocadillo */
        #mensaje::after {
            content: '';
            position: absolute;
            bottom: -15px; 
            left: 50%;
            transform: translateX(-50%);
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: rgba(255,255,255,0.95) transparent transparent; 
        }

        /* Botones en la parte superior derecha */
        .btn-nav { 
            position: absolute; 
            top: 20px; 
            padding: 12px 25px; 
            font-size: 16px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            color: white; 
            z-index: 10; 
            transition: all 0.3s ease; 
            font-weight: bold;
        }
        
        #btn-siguiente { right: 20px; background: #007BFF; }
        #btn-anterior { right: 200px; background: #6c757d; } 
        
        .btn-nav:hover { transform: scale(1.05); opacity: 0.9; }
        .btn-nav:disabled { background: #ccc; cursor: not-allowed; }
        .oculto { display: none; }
    </style>
</head>
<body onload="inicializarEscena()">
    <div id="escena">
        <img id="fondo" src="Dinosaurio/imagenes/Fondo1.0.jpg" alt="Fondo">
        
        <div id="contenedor-personaje">
            <div id="mensaje">Cargando...</div>
            <img id="personaje" src="" alt="Mapache">
        </div>
    </div>

    <button id="btn-siguiente" class="btn-nav">Siguiente</button>
    <button id="btn-anterior" class="btn-nav oculto">Anterior</button>

    <script>
        const escenas = [
            { fondo: "Dinosaurio/imagenes/Fondo1.0.jpg", pers: "Dinosaurio/imagenes/Mapache_Saluda.png", msg: "¡Hola, mapaches! Hoy veremos Entradas y Salidas (E/S) para entender cómo funciona un sistema por dentro.", titulo: "" },
            { fondo: "Dinosaurio/imagenes/Fondo1.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "¡Input detectado! 🐾 Tu dedo pulsó el botón y el Módulo de E/S lo tradujo a binario.", titulo: "<h2>1. El Momento del Click</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo2.jpg", pers: "Dinosaurio/imagenes/Mapache_Explica_ConDedo.png", msg: "Con Interrupciones, le aviso a la CPU: '¡Hey, detén todo, que tengo que saltar!'.", titulo: "<h2>2. ¿Revisar o Interrumpir?</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo3.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "¡Ahora explicaremos los diferentes buses que hay dentro!", titulo: "<h2>3.0. Los diferentes buses</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo3.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "¡Carga pesada! 🚚 El Bus de Datos transporta mis coordenadas y colores.", titulo: "<h2>3. El Bus de Datos</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo4.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "El Bus de Direcciones indica en qué parte de la RAM estoy guardado.", titulo: "<h2>4. El Bus de Direcciones</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo5.jpg", pers: "Dinosaurio/imagenes/Mapache_Explica_ConDedo.png", msg: "¡El jefe de tráfico! 🚦 El Bus de Control dice: '¡GPU, dibuja este frame!'.", titulo: "<h2>5. El Bus de Control</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo6.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "El Bus del Sistema conecta la CPU con la RAM a toda velocidad.", titulo: "<h2>6. Bus del Sistema</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo7.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "Los buses de expansión (teclado/mouse) son más lentos pero seguros.", titulo: "<h2>7. Bus de Periféricos</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo8.jpg", pers: "Dinosaurio/imagenes/Mapache_Explica_ConDedo.png", msg: "Cuando aceleras, la interrupción viaja más rápido que nada. ¡Magia!", titulo: "<h2>8. Interrupciones en Acción</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo9.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "Con DMA el sonido va directo a la tarjeta de audio sin molestar a la CPU.", titulo: "<h2>9. DMA y Canales</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo10.jpg", pers: "Dinosaurio/imagenes/Mapache_Explica_ConDedo.png", msg: "¡Mira esos píxeles! La GPU dibujó mi aterrizaje. ¡Salida exitosa!", titulo: "<h2>10. Resultado Final</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo10.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "¡Ya es oficial! Estamos actualizando los metadatos en el disco duro.", titulo: "<h2>Paso 11: Disco</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo11.jpg", pers: "Dinosaurio/imagenes/MapacheSalta.png", msg: "¡Ahora sí! Ya sabes cómo funciona un juego por dentro. ¡A jugar!", titulo: "<h2>Juego Interactivo</h2>" }
        ];

        let indice = 0;
        const btnSig = document.getElementById("btn-siguiente");
        const btnAnt = document.getElementById("btn-anterior");
        const fondo = document.getElementById("fondo");
        const personaje = document.getElementById("personaje");
        const mensaje = document.getElementById("mensaje");
        const contenedor = document.getElementById("contenedor-personaje");

        function ajustarPosicionContenedor(numEscena) {
            contenedor.style.left = "auto";
            contenedor.style.right = "auto";
            contenedor.style.transform = "none";

            const posicion = numEscena % 3;
            if (posicion === 0) contenedor.style.right = "80px";
            else if (posicion === 1) {
                contenedor.style.left = "50%";
                contenedor.style.transform = "translateX(-50%)";
            } 
            else contenedor.style.left = "80px";
        }

        function actualizarUI() {
            if (indice > 0) btnAnt.classList.remove("oculto");
            else btnAnt.classList.add("oculto");
            btnSig.innerText = (indice === escenas.length - 1) ? "Terminar" : "Siguiente";
        }

        function cambiarEscena(nuevoIndice) {
            indice = nuevoIndice;
            const escena = escenas[indice];
            fondo.style.opacity = 0;
            
            setTimeout(() => {
                fondo.src = escena.fondo;
                personaje.src = escena.pers;
                mensaje.innerHTML = (escena.titulo || "") + escena.msg;
                ajustarPosicionContenedor(indice);
                actualizarUI();
                fondo.style.opacity = 1;
            }, 150);
        }

        function inicializarEscena() {
            cambiarEscena(0);
        }

        btnSig.addEventListener("click", () => {
            if (indice < escenas.length - 1) cambiarEscena(indice + 1);
            else alert("¡Felicidades, experto en Mapaches y Sistemas!");
        });

        btnAnt.addEventListener("click", () => {
            if (indice > 0) cambiarEscena(indice - 1);
        });
    </script>
</body>
</html>
